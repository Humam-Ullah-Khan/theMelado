<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/images/Logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Melado by Guluna - Premium Dairy Ice Cream, Shakes & Popsicles. Crafted with Love in Peshawar." />
    <title>The Melado | Premium Dairy Ice Cream by Guluna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Yeseva+One&display=swap" rel="stylesheet">
    <style>
      #root { min-height: 100vh; }
      .melon-loader {
        position: fixed; inset: 0; z-index: 99999;
        background: #FFF8F0; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: 'Baloo 2', cursive;
        transition: opacity 0.5s ease;
      }
      .melon-loader.hide { opacity: 0; pointer-events: none; }
      .melon-loader .logo { width: 80px; height: 80px; border-radius: 16px; margin-bottom: 32px; animation: melonBounce 1s ease-in-out infinite; }
      .melon-loader .ring { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #F8789C, #45AFC6); margin-bottom: 32px; display: flex; align-items: center; justify-content: center; animation: melonPing 1.5s ease-in-out infinite; }
      .melon-loader .ring-inner { width: 48px; height: 48px; border-radius: 50%; background: #FFF8F0; }
      .melon-loader .dots { display: flex; gap: 8px; margin-bottom: 16px; }
      .melon-loader .dots span { width: 12px; height: 12px; background: #F8789C; border-radius: 50%; animation: melonDot 0.9s ease-in-out infinite; }
      .melon-loader .dots span:nth-child(2) { animation-delay: 0.15s; }
      .melon-loader .dots span:nth-child(3) { animation-delay: 0.3s; }
      .melon-loader p { color: #6C3439; font-size: 14px; font-weight: 700; letter-spacing: 0.05em; }
      .melon-loader .tagline { position: absolute; bottom: 32px; left: 0; right: 0; text-align: center; color: #6C3439; opacity: 0.3; font-size: 12px; font-family: 'Poppins', sans-serif; }
      @keyframes melonBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      @keyframes melonPing { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.08); opacity: 0.8; } }
      @keyframes melonDot { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="melon-loader" id="melon-loader">
        <img class="logo" src="/images/Logo.jpg" alt="Melado" />
        <div class="ring"><div class="ring-inner"></div></div>
        <div class="dots"><span></span><span></span><span></span></div>
        <p>Loading Melado...</p>
        <div class="tagline">Premium Dairy Ice Cream by Guluna</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
